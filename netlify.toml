[build]
  command = "pnpm build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"
  PNPM_VERSION = "10"

# SPA fallback so client-side routes (/project/:id, /inbox, etc.) work on direct load.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Security headers — stricter than the in-HTML CSP because they apply to non-HTML responses too.
[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self'; worker-src 'self'; manifest-src 'self'; base-uri 'self'; form-action 'none'; frame-ancestors 'none';"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), interest-cohort=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"

# Long-cache the hashed assets; Vite emits content-hashed filenames.
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Service worker must never be cached; it controls update behavior itself.
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache"
